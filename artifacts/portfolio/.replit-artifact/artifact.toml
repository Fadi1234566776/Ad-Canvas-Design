kind = "web"
previewPath = "/"
title = "Meta Ads Portfolio"
version = "1.0.0"
id = "artifacts/portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21113

[services.development]
run = "pnpm --filter @workspace/portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/portfolio", "run", "build" ]

[services.production.run]
args = [ "node", "--experimental-strip-types", "artifacts/portfolio/server.ts" ]

[services.production.run.env]
PORT = "21113"
NODE_ENV = "production"

[services.env]
PORT = "21113"
BASE_PATH = "/"
ADMIN_PASSWORD = "FadyImagesPortfolioWebsite@02^"
